<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ananyaflix</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #141414;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #splash {
      position: fixed;
      inset: 0;
      background: #141414;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #big-n {
      font-size: 220px;
      font-weight: 900;
      color: #E50914;
      font-family: 'Arial Black', Arial, sans-serif;
      transform: scale(0) rotate(-10deg);
      opacity: 0;
      animation: popN 0.7s cubic-bezier(0.34, 1.6, 0.64, 1) 0.3s forwards;
      line-height: 1;
      text-shadow: 0 0 60px rgba(229,9,20,0.5);
      position: relative;
      z-index: 2;
    }

    @keyframes popN {
      0%   { transform: scale(0) rotate(-10deg); opacity: 0; }
      50%  { transform: scale(1.25) rotate(3deg); opacity: 1; }
      75%  { transform: scale(0.95) rotate(-1deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    #welcome-text {
      font-size: 16px;
      color: #aaaaaa;
      letter-spacing: 8px;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.6s ease 1.2s forwards;
      margin-top: 16px;
      position: relative;
      z-index: 2;
    }

    #brand-name {
      font-size: 58px;
      font-weight: 900;
      font-family: 'Arial Black', Arial, sans-serif;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.6s ease 1.8s forwards;
      margin-top: 6px;
      position: relative;
      z-index: 2;
      letter-spacing: -1px;
    }

    #brand-name .red   { color: #E50914; }
    #brand-name .white { color: #ffffff; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    #splash.hide {
      animation: splashOut 0.8s ease forwards;
    }

    @keyframes splashOut {
      0%   { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.05); pointer-events: none; }
    }

    #main {
      background: #141414;
      min-height: 100vh;
      padding: 36px 44px;
      opacity: 0;
      display: none;
      animation: mainIn 0.8s ease forwards;
    }

    @keyframes mainIn { to { opacity: 1; } }

    #logo {
      font-size: 40px;
      font-weight: 900;
      font-family: 'Arial Black', Arial, sans-serif;
      margin-bottom: 36px;
    }
    #logo .red   { color: #E50914; }
    #logo .white { color: #ffffff; }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .card {
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    }

    .card-inner {
      width: 100%;
      padding-top: 62%;
      position: relative;
    }

    .card-bg {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-icon { font-size: 56px; }

    .card-label {
      position: absolute;
      bottom: 14px;
      left: 16px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0,0,0,0.9);
    }

    .bg1 { background: linear-gradient(135deg, #1a0a3e 0%, #4a2080 100%); }
    .bg2 { background: linear-gradient(135deg, #4a1800 0%, #9a3a00 100%); }
    .bg3 { background: linear-gradient(135deg, #052535 0%, #0a5060 100%); }

    @media (max-width: 600px) {
      .cards { grid-template-columns: 1fr; }
      #big-n { font-size: 130px; }
      #brand-name { font-size: 38px; }
      #main { padding: 24px 20px; }
      .video-container { width: 98%; }
    }

    #video-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    #video-modal.show {
      display: flex;
    }

    .video-container {
      position: relative;
      width: 90%;
      max-width: 1000px;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
    }

    #video-player {
      width: 100%;
      height: auto;
      background: #000;
    }

    .close-video {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(229,9,20,0.8);
      color: white;
      border: none;
      font-size: 28px;
      width: 40px;
      height: 40px;
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .close-video:hover {
      background: #E50914;
    }
  </style>
</head>
<body>

  <div id="splash">
    <div id="big-n">N</div>
    <div id="welcome-text">welcome to</div>
    <div id="brand-name">
      <span class="red">Ananya</span><span class="white">flix</span>
    </div>
  </div>

  <div id="main">
    <div id="logo">
      <span class="red">Ananya</span><span class="white">flix</span>
    </div>

    <div class="cards">

      <div class="card" onclick="openVideo('YOUR_VIDEO_LINK_1')">
        <div class="card-inner">
          <div class="card-bg bg1">
            <div class="card-icon">🌀</div>
          </div>
          <div class="card-label">Her Story</div>
        </div>
      </div>

      <div class="card" onclick="openVideo('us-new.mp4')">
        <div class="card-inner">
          <div class="card-bg bg2">
            <div class="card-icon">❤️</div>
          </div>
          <div class="card-label">US</div>
        </div>
      </div>

      <div class="card" onclick="openVideo('YOUR_VIDEO_LINK_3')">
        <div class="card-inner">
          <div class="card-bg bg3">
            <div class="card-icon">📷</div>
          </div>
          <div class="card-label">Memories</div>
        </div>
      </div>

    </div>
  </div>

  <div id="video-modal">
    <div class="video-container">
      <button class="close-video" onclick="closeVideo()">×</button>
      <video id="video-player" controls autoplay>
        <source src="" type="video/mp4">
        Your browser does not support the video tag.
      </video>
    </div>
  </div>

  <script>
    function playTudum() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();

        function makeOsc(type, freq, t, dur, peak, end) {
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.type = type;
          o.frequency.setValueAtTime(freq, t);
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(peak, t + 0.01);
          g.gain.exponentialRampToValueAtTime(end || 0.001, t + dur);
          o.connect(g); g.connect(ctx.destination);
          o.start(t); o.stop(t + dur);
        }

        function makeNoise(t, dur, peak) {
          const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
          const d = buf.getChannelData(0);
          for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
          const src = ctx.createBufferSource();
          src.buffer = buf;
          const flt = ctx.createBiquadFilter();
          flt.type = 'lowpass'; flt.frequency.value = 800;
          const g = ctx.createGain();
          g.gain.setValueAtTime(peak, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + dur);
          src.connect(flt); flt.connect(g); g.connect(ctx.destination);
          src.start(t); src.stop(t + dur);
        }

        const now = ctx.currentTime;

        makeNoise(now, 0.06, 0.4);
        makeOsc('sine', 55, now, 0.55, 0.9, 0.01);
        makeOsc('sine', 110, now, 0.40, 0.5, 0.01);
        makeOsc('triangle', 80, now, 0.45, 0.35, 0.01);

        const d = now + 0.55;
        makeOsc('sine', 220, d, 1.6, 1.0, 0.01);
        makeOsc('sine', 440, d, 1.4, 0.35, 0.01);
        makeOsc('sine', 330, d, 1.4, 0.18, 0.01);
        makeOsc('triangle', 220, d, 1.6, 0.4, 0.01);

        const o2 = ctx.createOscillator(), g2 = ctx.createGain();
        o2.type = 'sine';
        o2.frequency.setValueAtTime(200, d);
        o2.frequency.linearRampToValueAtTime(228, d + 0.12);
        o2.frequency.setValueAtTime(220, d + 0.12);
        g2.gain.setValueAtTime(0, d);
        g2.gain.linearRampToValueAtTime(0.6, d + 0.02);
        g2.gain.exponentialRampToValueAtTime(0.001, d + 1.6);
        o2.connect(g2); g2.connect(ctx.destination);
        o2.start(d); o2.stop(d + 1.7);

      } catch(e) {}
    }

    let soundPlayed = false;
    function triggerSound() {
      if (!soundPlayed) {
        playTudum();
        soundPlayed = true;
      }
    }
    document.addEventListener('click', triggerSound);
    document.addEventListener('touchstart', triggerSound);

    setTimeout(() => {
      const splash = document.getElementById('splash');
      splash.classList.add('hide');
      setTimeout(() => {
        splash.style.display = 'none';
        document.body.style.overflow = 'auto';
        const main = document.getElementById('main');
        main.style.display = 'block';
      }, 800);
    }, 3200);

    function openVideo(url) {
      if (!url.startsWith('YOUR_')) {
        const video = document.getElementById('video-player');
        const modal = document.getElementById('video-modal');
        console.log('Loading video:', url);
        video.volume = 1;
        video.muted = false;
        video.src = url;
        modal.classList.add('show');
        video.onerror = function() {
          console.error('Video error:', video.error);
          alert('Error loading video. Check browser console for details.');
        };
      } else {
        alert('Replace YOUR_VIDEO_LINK with your actual video URL in the HTML!');
      }
    }

    function closeVideo() {
      const modal = document.getElementById('video-modal');
      const video = document.getElementById('video-player');
      video.pause();
      video.src = '';
      modal.classList.remove('show');
    }

    document.getElementById('video-modal').addEventListener('click', function(e) {
      if (e.target === this) closeVideo();
    });
  </script>

</body>
</html>
